    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('plok-splash');
          if (splash) {
            splash.style.opacity = '0';
            splash.style.visibility = 'hidden';
            setTimeout(() => splash.remove(), 600);
          }
        }, 1500);
      });

      (function () {
        function detectAdBlockExtension() {
          return new Promise((resolve) => {
            const bait = document.createElement("div");
            bait.className = "adsbox ad-banner ad-unit text-ad";
            bait.style.cssText = "width:1px;height:1px;position:absolute;left:-9999px;top:-9999px;visibility:hidden;";
            document.body.appendChild(bait);
            setTimeout(() => {
              const isBlocked = !bait.parentElement || bait.offsetParent === null || window.getComputedStyle(bait).display === "none";
              if (bait.parentElement) document.body.removeChild(bait);
              resolve(isBlocked);
            }, 100);
          });
        }
        function detectDnsBlock() {
          return fetch('https://facultativethus.com/e57ns91yz8?key=06ab55d13d86b8641e906b3b87eb6915', { method: 'HEAD', mode: 'no-cors', cache: 'no-store' })
            .then(() => false).catch(() => true);
        }
        function showAdblockPopup() {
          if (document.getElementById("adblock-overlay")) return;
          const overlay = document.createElement("div");
          overlay.id = "adblock-overlay";
          overlay.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.98);display:flex;justify-content:center;align-items:center;z-index:99999999;opacity:0;transition:opacity 0.4s ease;padding:20px;";
          overlay.innerHTML = `
            <div style="background:#111;padding:32px;border-radius:12px;text-align:center;max-width:420px;width:100%;border:1px solid #DC2626;transform:scale(0.95);transition:transform 0.4s ease;box-shadow:0 20px 50px rgba(220,38,38,0.3);">
                <h2 style="margin:0 0 12px;font-size:24px;font-weight:900;color:#DC2626;letter-spacing:-0.5px;text-transform:uppercase;">Akses Dibatasi</h2>
                <p style="margin:0 0 24px;font-size:15px;line-height:1.6;color:#a1a1aa;font-weight:600;">PlokStream beroperasi secara gratis berkat dukungan iklan. Mohon matikan AdBlocker Anda pada browser atau jaringan untuk melanjutkan.</p>
                <button id="refresh-page-btn" style="background:#DC2626;color:white;border:none;border-radius:6px;padding:14px 24px;font-size:16px;font-weight:800;cursor:pointer;width:100%;text-transform:uppercase;transition:background 0.3s;">Muat Ulang Halaman</button>
            </div>
          `;
          document.body.appendChild(overlay);
          requestAnimationFrame(() => {
            overlay.style.opacity = "1";
            overlay.children[0].style.transform = "scale(1)";
          });
          document.getElementById("refresh-page-btn").addEventListener("click", () => location.reload());
        }
        window.addEventListener("load", async () => {
          if (await detectAdBlockExtension() || await detectDnsBlock()) showAdblockPopup();
        });
      })();
